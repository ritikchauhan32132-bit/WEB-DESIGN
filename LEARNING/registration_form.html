<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>


    <h2>Event Registrarion</h2>

    <form>

        <label for="name">name: </label>
        <input type="text" placeholder="Enter name" id="name" name="Name" required>
        <br>
        <br>

        <label for="Email">Email: </label>
        <input type="email" placeholder="exprinece@email.com" id="Email" name="Email" required>
        <br>
        <br>

        <label for="phone">Phone: </label>
        <input type="tel" placeholder="XXXXXXXXXX" id="Email" name="Name" required>
        <br><br>

        <label for="select">Occupztion: </label>
        <select name="SELECT ITEMS" id="select" required>

            <option value="Yes">Yes</option>

        </select>
        <br><br>

        <br><br>
        <fieldset>
            <legend>Topics of interest: </legend>
            <label for="check1">HTML: </label>
            <input type="checkbox" name="HTML" id="check1" required>

            <label for="check2">CSS: </label>

            <br><br>
            <label for="chec3">CSS: </label>
            <input type="checkbox" name="JS" id="chec3" required>
            <br><br>
            <label for="comment">Comment: </label>
            <textarea name="comment" id="comment" placeholder="Give Your Feedback..." required></textarea>
            <input type="submit" value="Registrarion">


        </fieldset>
    </form>

</html>
